<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0805">
<title>Paiement réussi · Jacob's Bio Cosmétique</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/logo_embleme_blanc.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap">
<style>
  :root {
    --gold: #D4A744;
    --gold-deep: #A68035;
    --gold-gradient: linear-gradient(135deg, #ECC764 0%, #D4A744 50%, #A68035 100%);
    --cream: #FAF6EC;
    --ivory: #FFFCF4;
    --text: #1A1410;
    --text-soft: #4A413A;
    --success: #16a34a;
    --success-soft: #DCFCE7;
    --border: rgba(10, 8, 5, 0.09);
    --whatsapp: #25D366;
    --display: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Outfit', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    max-width: 560px; width: 100%;
    background: var(--ivory);
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: 0 30px 80px -20px rgba(11, 8, 5, 0.20), 0 0 0 1px rgba(212, 167, 68, 0.20);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--gold-gradient);
  }
  .brand {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 30px;
  }
  .brand img { width: 36px; height: 36px; }
  .brand-name {
    font-family: var(--display); font-size: 22px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .brand-name em { font-style: italic; color: var(--gold-deep); font-weight: 400; margin-left: 4px; }
  .icon-wrap {
    width: 88px; height: 88px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: var(--success-soft);
    display: grid; place-items: center;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .icon-wrap svg { width: 44px; height: 44px; stroke: var(--success); stroke-width: 3; fill: none; }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  h1 {
    font-family: var(--display);
    font-size: clamp(30px, 5vw, 40px);
    font-weight: 500;
    margin-bottom: 12px;
    color: var(--text);
  }
  h1 em { font-style: italic; color: var(--success); }
  .lead {
    font-size: 16px; color: var(--text-soft); line-height: 1.6;
    max-width: 420px; margin: 0 auto 32px;
  }
  .order-id {
    display: inline-block;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 28px;
    margin-bottom: 32px;
  }
  .order-id-label {
    font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--gold-deep); margin-bottom: 4px;
  }
  .order-id-value {
    font-family: var(--display); font-size: 28px; font-weight: 600;
    color: var(--gold-deep); letter-spacing: 0.02em;
  }
  .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 24px;
    border-radius: 999px;
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    letter-spacing: 0.06em;
    text-decoration: none;
    border: none;
    transition: all 0.2s;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--gold-gradient);
    color: var(--text);
    box-shadow: 0 10px 30px -8px rgba(212, 167, 68, 0.55);
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-whatsapp { background: var(--whatsapp); color: white; }
  .btn-ghost {
    background: transparent; color: var(--text-soft);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--cream); }
  .checking {
    display: inline-block;
    padding: 6px 14px;
    background: #FEF3C7;
    border-radius: 20px;
    font-size: 12px;
    color: #B45309;
    margin-bottom: 20px;
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(180, 83, 9, 0.3);
    border-top-color: #B45309;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<article class="card">
  <div class="brand">
    <img src="assets/logo_embleme_noir.png" alt="Jacob's Bio">
    <div class="brand-name">Jacob's <em>Bio</em></div>
  </div>

  <div id="checkingBlock" class="checking" style="display:none;">
    <span class="spinner"></span> Vérification du paiement en cours…
  </div>

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <h1>Paiement <em>reçu</em></h1>
  <p class="lead" id="leadText">
    Merci ! Votre commande est confirmée et enregistrée dans nos systèmes. Vous allez recevoir un email de confirmation.
  </p>

  <div class="order-id" id="orderIdBlock" style="display:none;">
    <div class="order-id-label">Numéro de commande</div>
    <div class="order-id-value" id="orderIdValue">—</div>
  </div>

  <div class="actions">
    <a class="btn btn-primary" id="receiptBtn" href="#" style="display:none;">Voir le reçu détaillé</a>
    <a class="btn btn-whatsapp" href="https://wa.me/2250777362923?text=Bonjour%20Jacob%27s%20Bio%2C%20je%20viens%20de%20payer%20ma%20commande%20en%20ligne.%20Voici%20mon%20num%C3%A9ro%20de%20commande%20%3A%20" id="waBtn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M17.5 14.4c-.3-.2-1.8-.9-2-1-.3-.1-.5-.1-.7.2-.2.3-.8 1-1 1.2-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.2-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.4z"/><path d="M12 2a10 10 0 00-8.6 15l-1.4 5 5.1-1.3A10 10 0 1012 2z"/></svg>
      Confirmer sur WhatsApp
    </a>
    <a class="btn btn-ghost" href="index.html">← Retour à la boutique</a>
  </div>
</article>

<script>
  const CRM_API_URL = 'https://script.google.com/macros/s/AKfycbzhIM4WNYJNnqr3XamM0bDoWi_Ze-zIDJI4S2mm097S58m_Osn4YzY97A41-Q-nerQN/exec';
  const params = new URLSearchParams(location.search);
  const orderId = params.get('id') || '';
  const orderIdBlock = document.getElementById('orderIdBlock');
  const orderIdValue = document.getElementById('orderIdValue');
  const receiptBtn = document.getElementById('receiptBtn');
  const waBtn = document.getElementById('waBtn');
  const leadText = document.getElementById('leadText');
  const checkingBlock = document.getElementById('checkingBlock');

  if (orderId) {
    orderIdBlock.style.display = 'inline-block';
    orderIdValue.textContent = orderId;
    receiptBtn.href = 'recu.html?id=' + encodeURIComponent(orderId);
    receiptBtn.style.display = 'inline-flex';
    waBtn.href = waBtn.href + encodeURIComponent(orderId);

    // Polling léger : vérifie que le statut est bien "Payee en ligne" (le webhook a bien atterri)
    let attempts = 0;
    const maxAttempts = 6; // 6 x 3s = 18s
    checkingBlock.style.display = 'inline-block';

    const check = async () => {
      attempts++;
      try {
        const r = await fetch(CRM_API_URL + '?action=receipt&id=' + encodeURIComponent(orderId));
        const d = await r.json();
        const s = String(d.statut || '').toLowerCase();
        if (s.includes('payee') || s.includes('livr') || s.includes('confirm')) {
          checkingBlock.style.display = 'none';
          leadText.textContent = 'Paiement reçu et confirmé. Votre commande est enregistrée, nous vous préparons ça au plus vite.';
          return;
        }
      } catch (e) {}
      if (attempts < maxAttempts) {
        setTimeout(check, 3000);
      } else {
        checkingBlock.style.display = 'none';
        leadText.textContent = 'Votre paiement a bien été traité par GeniusPay. La confirmation dans notre système peut prendre quelques instants — vous pouvez fermer cette page en toute sécurité.';
      }
    };
    setTimeout(check, 2000);
  }
</script>

</body>
</html>
